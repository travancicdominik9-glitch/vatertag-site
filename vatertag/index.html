<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<title>Za mog tatu</title>
<style>
body {
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
  color: white;
  text-align: center;
  overflow: hidden;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: black;
}

#background {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: url('hintergrund.jpg');
  background-size: cover;
  background-position: center;
  filter: blur(0.5px); /* leicht verschwommen */
  z-index: -2;
}

#overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.3);
  z-index: -1;
}

#content {
  text-align: center;
  z-index: 1;
  max-width: 90%;
}

h1 {
  font-size: 40px;
  margin-bottom: 20px;
  opacity: 1;
}

#message {
  font-size: 24px;
  margin-top: 20px;
  opacity: 0; /* unsichtbar bis Klick */
}

button {
  margin-top: 30px;
  padding: 15px 30px;
  font-size: 20px;
  border: none;
  border-radius: 12px;
  background: #22c55e;
  cursor: pointer;
  transition: 0.3s;
}
button:hover { transform: scale(1.1); background: #16a34a; }

.heart {
  position: absolute;
  color: red;
  font-size: 30px;
  opacity: 0.9;
  animation: fadeUp 3s forwards cubic-bezier(0.68, -0.55, 0.27, 1.55);
}

@keyframes fadeUp { 
  0% { transform: translateY(0); opacity: 1; } 
  100% { transform: translateY(-600px); opacity: 0; } 
}
</style>
</head>
<body>

<div id="background"></div>
<div id="overlay"></div>

<div id="content">
  <h1>Za mog tatu ❤️</h1>
  <button onclick="startSurprise()">Klikni me</button>
  <div id="message">
    Iako sam jučer zaboravio na Dan očeva...<br><br>
    Hvala ti na svemu što činiš za mene.<br>
    Cijenim te više nego što mogu reći.<br><br>
    Ti si najbolji ❤️
  </div>
</div>

<script>
function startSurprise() {
    document.getElementById("message").style.opacity = "1";

    for(let i=0;i<20;i++){ 
        setTimeout(createHeart, i*200); 
    }
}

function createHeart() {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.top = "100%";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),3000);
}
</script>

</body>
</html>
